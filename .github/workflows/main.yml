name: Build & Deploy

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'schedule' && 'production-scheduled' || 'production' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Build Eleventy
        run: npm run build
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          SHEET_GENERALES: ${{ vars.SHEET_GENERALES }}
          SHEET_CASAS: ${{ vars.SHEET_CASAS }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: realflamingos
          directory: _site
